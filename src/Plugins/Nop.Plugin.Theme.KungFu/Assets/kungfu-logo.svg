<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Circular background with gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circle background -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" opacity="0.1"/>
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#grad1)" stroke-width="3"/>
  
  <!-- Yin Yang inspired design -->
  <g transform="translate(100,100)">
    <!-- Inner circle -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#grad1)" stroke-width="2"/>
    
    <!-- Stylized martial arts figure -->
    <g transform="scale(0.8)">
      <!-- Head -->
      <circle cx="0" cy="-30" r="8" fill="url(#grad1)"/>
      
      <!-- Body -->
      <path d="M 0,-22 L 0,10" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
      
      <!-- Arms in martial arts pose -->
      <path d="M -20,-5 L 0,0 L 20,-15" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round" fill="none"/>
      
      <!-- Legs in stance -->
      <path d="M 0,10 L -15,30" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
      <path d="M 0,10 L 15,25" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>
  
  <!-- Text "KF" in stylized form -->
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="url(#grad1)">KUNG FU</text>
</svg>
